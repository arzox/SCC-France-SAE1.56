<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>Contact</title>
        <link rel="stylesheet" href="../style.css">
    </head>
    <body>
        <header>
            <nav>
                HEADER
            </nav>
        </header>
        
        <main>
            <figure>
                <img src="../assets/contact/icon-user.png" alt="icon-user">
            </figure>
            <form method="get" action="">
                <h2>Nom complet</h2>
                <p>
                    <input type="text" name="Prénom" placeholder="Prénom" required>
                    <input type="text" name="Prénom" placeholder="Nom" required>
                </p>
                <h2>Informations de contact</h2>
                <input type="text" name="Adresse-Mail" placeholder="Adresse mail" required><br />
                <input type="text" name="Numéro" placeholder="Numéro" required>
                <h2>Adresse</h2>
                <p>
                    <input type="text" name="Adresse" placeholder="Adresse" required><br />
                    <input type="text" name="Code-Postal" placeholder="Code Postal" required>
                    <input type="text" name="Ville" placeholder="Ville" required>
                </p>
                <p>
                    <label> 
                        <input type="radio" name="choix" value="Stage">
                        Stage
                    </label>

                    <label> 
                        <input type="radio" name="choix" value="Emplois">
                        Emplois
                    </label>

                    <label> 
                        <input type="radio" name="choix" value="Question">
                        Question
                    </label>

                    <label> 
                        <input type="radio" name="choix" value="Autre" checked>
                        Autre
                    </label>
                </p>
                
                <textarea
                name="textarea"
                rows="5"
                cols="30"
                placeholder="Text..."></textarea>



                <p><input type="submit" value="Envoyer"></p> 
            </form>
        </main>
    </body>
</html>
